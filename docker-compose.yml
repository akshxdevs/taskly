services:
  taskly-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taskly-backend
    ports:
      - "8090:8080"
    environment:
      PORT: "8080"
      BLUEPRINT_DB_URL: /data/taskly.db
      AUTH_SECRET: ${AUTH_SECRET:-change-me-in-production}
      REDIS_ADDR: ${REDIS_ADDR:-host.docker.internal:6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
    volumes:
      - taskly_data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: taskly-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "9191:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - taskly-backend
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    container_name: taskly-grafana
    ports:
      - "3200:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  taskly_data:
  prometheus_data:
  grafana_data:
