services:
  taskly-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taskly-backend
    ports:
      - "8090:8080"
    environment:
      PORT: "8080"
      BLUEPRINT_DB_URL: /data/taskly.db
      AUTH_SECRET: ${AUTH_SECRET:-change-me-in-production}
      REDIS_ADDR: ${REDIS_ADDR:-host.docker.internal:6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
    volumes:
      - taskly_data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  taskly_data:
